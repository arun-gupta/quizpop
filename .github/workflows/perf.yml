name: Performance

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from Actions tab

jobs:
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push benchmark history to gh-pages

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Poll Vercel until the latest production deployment for this commit is READY.
      # Works with both project-scoped (vcp_) and account-scoped tokens.
      - name: Wait for Vercel deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for Vercel to deploy $COMMIT_SHA..."
          for i in $(seq 1 36); do
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?limit=10&target=production" \
              -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null || echo '{}')

            # Try matching by commit SHA first, fall back to latest READY
            STATE=$(echo "$RESPONSE" \
              | jq -r ".deployments[] | select(.meta.githubCommitSha == \"$COMMIT_SHA\") | .readyState" \
              | head -1)

            # If no SHA match (project token scope), check latest deployment state
            if [ -z "$STATE" ]; then
              STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].readyState // ""')
              echo "  attempt $i/36: latest state=${STATE:-unknown} (no SHA match — project token)"
            else
              echo "  attempt $i/36: commit state=$STATE"
            fi

            if [ "$STATE" = "READY" ]; then
              echo "Deployment ready ✓"
              exit 0
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed: $STATE"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out after 6 min — continuing anyway"

      - name: Load test — 50 players
        run: |
          npm run load-test -- \
            --players=50 \
            --url=${{ vars.PRODUCTION_URL }} \
            --out=results-50.json \
            --benchmark-out=bench-50.json

      - name: Load test — 100 players
        run: |
          npm run load-test -- \
            --players=100 \
            --url=${{ vars.PRODUCTION_URL }} \
            --out=results-100.json \
            --benchmark-out=bench-100.json

      # Merge both benchmark files into one for the chart
      - name: Merge benchmark data
        run: |
          node -e "
            const a = require('./bench-50.json');
            const b = require('./bench-100.json');
            require('fs').writeFileSync('benchmark.json', JSON.stringify([...a, ...b], null, 2));
          "

      # Append to gh-pages branch — auto-creates the branch & chart page
      - name: Store benchmark history + generate trend chart
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: QuizPop API Latency
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench

      # Write a human-readable summary in the Actions run
      - name: Write job summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const r50  = JSON.parse(fs.readFileSync('results-50.json',  'utf8'));
            const r100 = JSON.parse(fs.readFileSync('results-100.json', 'utf8'));
            const fmt = n => n.toFixed(0) + 'ms';
            const rows = [r50, r100].map(r =>
              '| ' + [
                r.players,
                r.join.passed + '/' + r.join.total,
                fmt(r.join.p50),  fmt(r.join.p95),
                r.answer.passed + '/' + r.answer.total,
                fmt(r.answer.p50), fmt(r.answer.p95),
                r.autoReveal ? '✅' : '❌',
                r.pass ? '✅ PASS' : '❌ FAIL',
              ].join(' | ') + ' |'
            ).join('\n');
            const md = [
              '## 🚀 Performance Results',
              '',
              '| Players | Join OK | Join p50 | Join p95 | Answer OK | Answer p50 | Answer p95 | Auto-reveal | Status |',
              '|---------|---------|----------|----------|-----------|------------|------------|-------------|--------|',
              rows,
              '',
              '> Trend chart: https://\${{ github.repository_owner }}.github.io/\${{ github.event.repository.name }}/dev/bench/',
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          "

      # Deploy custom perf dashboard to gh-pages (replaces benchmark-action default page)
      - name: Deploy custom perf dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the HTML from the main checkout before switching branches
          cp scripts/perf-report.html /tmp/perf-report.html

          git fetch origin gh-pages
          git checkout gh-pages

          # Tell Vercel not to build this branch
          echo '{"buildCommand":null,"installCommand":null,"framework":null}' > vercel.json

          mkdir -p dev/bench
          cp /tmp/perf-report.html dev/bench/index.html

          git add vercel.json dev/bench/index.html
          # Only commit if there are changes (file may be identical across runs)
          git diff --cached --quiet || git commit -m "chore: update perf dashboard [skip ci]"
          git push origin gh-pages

          git checkout -

      # Keep raw JSON as a downloadable artifact for 90 days
      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: perf-results-${{ github.sha }}
          path: results-*.json
          retention-days: 90
