<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizPop · Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0a1e; color: #e2d9f3; min-height: 100vh; padding: 2rem 1rem; }
    a { color: #a78bfa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1100px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .header h1 { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .header .tag { font-size: 0.75rem; font-weight: 700; background: #4c1d95; color: #c4b5fd; padding: 2px 10px; border-radius: 99px; }
    .updated { margin-left: auto; font-size: 0.75rem; color: #6b7280; }

    /* Summary cards */
    .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #7c3aed; margin-bottom: 0.75rem; margin-top: 2rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 0.5rem; }
    .card { background: #1a0f35; border: 1px solid #2d1b6b; border-radius: 12px; padding: 1.1rem 1.3rem; }
    .card .label { font-size: 0.72rem; color: #9ca3af; font-weight: 600; margin-bottom: 0.4rem; }
    .card .value { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
    .card .unit  { font-size: 0.75rem; color: #6b7280; margin-left: 2px; }
    .card .trend { margin-top: 0.5rem; font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .trend.up    { color: #f87171; }
    .trend.down  { color: #34d399; }
    .trend.flat  { color: #9ca3af; }

    /* Charts */
    .charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1.5rem; }
    .chart-box { background: #1a0f35; border: 1px solid #2d1b6b; border-radius: 12px; padding: 1.2rem; }
    .chart-box h3 { font-size: 0.85rem; font-weight: 700; color: #c4b5fd; margin-bottom: 1rem; }
    .chart-box canvas { width: 100% !important; }

    /* Commit table */
    .table-wrap { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th { text-align: left; color: #7c3aed; font-weight: 700; padding: 6px 10px; border-bottom: 1px solid #2d1b6b; }
    td { padding: 6px 10px; border-bottom: 1px solid #1e1040; color: #d1d5db; }
    tr:hover td { background: #1e1040; }
    .sha { font-family: monospace; color: #a78bfa; }
    .pass { color: #34d399; font-weight: 700; }
    .fail { color: #f87171; font-weight: 700; }

    @media (max-width: 600px) {
      .charts { grid-template-columns: 1fr; }
      .cards  { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>🚀 QuizPop Performance</h1>
      <div style="font-size:0.8rem;color:#9ca3af;margin-top:4px">
        API latency under concurrent load · <a href="https://github.com/arun-gupta/quizpop" target="_blank">arun-gupta/quizpop</a>
      </div>
    </div>
    <div class="tag">CI</div>
    <div class="updated" id="updated"></div>
  </div>

  <!-- Trend summary cards -->
  <div class="section-title">Latest run — trend vs previous</div>
  <div class="cards" id="cards"></div>

  <!-- Charts -->
  <div class="section-title" style="margin-top:2.5rem">History per metric</div>
  <div class="charts" id="charts"></div>

  <!-- Commit log table -->
  <div class="section-title" style="margin-top:2.5rem">Run log</div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Commit</th><th>Message</th><th>Date</th>
        <th>Join p50</th><th>Join p95</th>
        <th>Ans p50</th><th>Ans p95</th>
      </tr></thead>
      <tbody id="log"></tbody>
    </table>
  </div>

</div>

<!-- benchmark-action writes this file -->
<script src="data.js"></script>
<script>
(function () {
  const DATA = window.BENCHMARK_DATA
  if (!DATA) { document.body.innerHTML = '<p style="color:#f87171;padding:2rem">No benchmark data yet — run the CI workflow first.</p>'; return }

  const suite = Object.values(DATA.entries)[0] ?? []
  document.getElementById('updated').textContent =
    'Updated ' + new Date(DATA.lastUpdate).toLocaleString()

  // ── helpers ──────────────────────────────────────────────────────────────
  function getBench(run, name) {
    return run.benches.find(b => b.name === name)?.value ?? null
  }
  function shortSha(id) { return id.slice(0, 7) }
  function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) }
  function trendIcon(curr, prev) {
    if (prev == null) return { cls: 'flat', icon: '→', delta: '' }
    const pct = ((curr - prev) / prev) * 100
    if (Math.abs(pct) < 2) return { cls: 'flat', icon: '→', delta: '±0%' }
    return pct > 0
      ? { cls: 'up',   icon: '↑', delta: '+' + pct.toFixed(1) + '%' }
      : { cls: 'down', icon: '↓', delta: pct.toFixed(1) + '%' }
  }

  const METRICS = [
    { key: 'join_p50 (50 players)',   label: 'Join p50',   sub: '50 players' },
    { key: 'join_p95 (50 players)',   label: 'Join p95',   sub: '50 players' },
    { key: 'answer_p50 (50 players)', label: 'Answer p50', sub: '50 players' },
    { key: 'answer_p95 (50 players)', label: 'Answer p95', sub: '50 players' },
    { key: 'join_p50 (100 players)',  label: 'Join p50',   sub: '100 players' },
    { key: 'join_p95 (100 players)',  label: 'Join p95',   sub: '100 players' },
    { key: 'answer_p50 (100 players)',label: 'Answer p50', sub: '100 players' },
    { key: 'answer_p95 (100 players)',label: 'Answer p95', sub: '100 players' },
  ]

  const latest = suite[suite.length - 1]
  const prev   = suite[suite.length - 2] ?? null

  // ── Summary cards ─────────────────────────────────────────────────────────
  const cardsEl = document.getElementById('cards')
  METRICS.forEach(m => {
    const curr = getBench(latest, m.key)
    const p    = prev ? getBench(prev, m.key) : null
    if (curr == null) return
    const t = trendIcon(curr, p)
    cardsEl.innerHTML += `
      <div class="card">
        <div class="label">${m.label} · ${m.sub}</div>
        <div class="value">${curr}<span class="unit">ms</span></div>
        <div class="trend ${t.cls}">${t.icon} ${t.delta || '—'} ${p != null ? 'vs ' + p + 'ms' : 'first run'}</div>
      </div>`
  })

  // ── Charts ────────────────────────────────────────────────────────────────
  const COLORS = ['#818cf8','#f472b6','#34d399','#fbbf24','#60a5fa','#a78bfa','#fb923c','#4ade80']
  const chartsEl = document.getElementById('charts')
  const labels = suite.map(r => shortSha(r.commit.id))

  // Group: one chart per base metric name (join_p50, join_p95, answer_p50, answer_p95)
  // Each chart has two series: 50 players + 100 players
  const BASE_METRICS = [
    { base: 'join_p50',   title: 'Join latency — p50' },
    { base: 'join_p95',   title: 'Join latency — p95' },
    { base: 'answer_p50', title: 'Answer latency — p50' },
    { base: 'answer_p95', title: 'Answer latency — p95' },
  ]

  BASE_METRICS.forEach((bm, ci) => {
    const id = 'chart-' + bm.base
    chartsEl.innerHTML += `<div class="chart-box"><h3>${bm.title}</h3><canvas id="${id}"></canvas></div>`

    const datasets = ['50 players', '100 players'].map((players, pi) => ({
      label: players,
      data: suite.map(r => getBench(r, `${bm.base} (${players})`)),
      borderColor: COLORS[ci * 2 + pi],
      backgroundColor: COLORS[ci * 2 + pi] + '22',
      tension: 0.3,
      fill: true,
      pointRadius: 4,
      pointHoverRadius: 6,
    }))

    new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#c4b5fd', font: { size: 12 } } },
          tooltip: {
            callbacks: {
              title: (items) => {
                const run = suite[items[0].dataIndex]
                return shortSha(run.commit.id) + ' · ' + run.commit.message.slice(0, 60)
              },
              label: (item) => ` ${item.dataset.label}: ${item.raw}ms`,
            }
          }
        },
        scales: {
          x: { ticks: { color: '#6b7280', font: { size: 11 } }, grid: { color: '#1e1040' } },
          y: { ticks: { color: '#6b7280', callback: v => v + 'ms' }, grid: { color: '#1e1040' }, beginAtZero: false },
        }
      }
    })
  })

  // ── Run log table ─────────────────────────────────────────────────────────
  const logEl = document.getElementById('log')
  ;[...suite].reverse().forEach(r => {
    const jp50 = getBench(r, 'join_p50 (50 players)')
    const jp95 = getBench(r, 'join_p95 (50 players)')
    const ap50 = getBench(r, 'answer_p50 (50 players)')
    const ap95 = getBench(r, 'answer_p95 (50 players)')
    logEl.innerHTML += `
      <tr>
        <td><a class="sha" href="${r.commit.url}" target="_blank">${shortSha(r.commit.id)}</a></td>
        <td>${r.commit.message.slice(0, 60)}${r.commit.message.length > 60 ? '…' : ''}</td>
        <td>${fmtDate(r.date)}</td>
        <td>${jp50 ?? '—'}ms</td>
        <td>${jp95 ?? '—'}ms</td>
        <td>${ap50 ?? '—'}ms</td>
        <td>${ap95 ?? '—'}ms</td>
      </tr>`
  })
})()
</script>
</body>
</html>
